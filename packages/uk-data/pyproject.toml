[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "uk-data"
version = "0.1.0"
description = "Standalone UK economic and business data integration package"
readme = "../../README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "jstammers", email = "jimmy.stammers@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "duckdb>=1.0.0",
    "numpy>=1.26.0",
    "polars>=1.38.1",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
companies-house = ["companies-house[xbrl,analysis]"]

[tool.hatch.build.targets.wheel]
packages = ["src/uk_data"]

[project.scripts]
ukd = "uk_data.cli:app"

[tool.uv.sources]
companies-house = { workspace = true }
