# =============================================================================
# Workspace root — virtual root (no publishable package).
# Packages live under packages/*/  following the uv recommended workspace layout:
# https://docs.astral.sh/uv/concepts/projects/workspaces/
# =============================================================================

[tool.uv]
package = false

[tool.uv.workspace]
members = ["packages/*"]
exclude = ["packages/rust-abm"]

# =============================================================================
# Dependency groups (dev / docs tooling — installed workspace-wide)
# =============================================================================

[dependency-groups]
dev = [
    "pytest>=9.0.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.14",
    "ty>=0.0.14",
    "hatch>=1.16.3",
    "prek>=0.1.0",
    "pysentry-rs>=0.1.0",
    "cryptography>=46.0.6",
    "pygments>=2.20.0",
    "requests>=2.33.0",
    "pylint>=4.0.5",
]
docs = [
    "lxml>=6.1.0",
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.7.0",
    "mkdocstrings-python>=2.0.1",
]

# =============================================================================
# Hatch (cross-Python matrix testing via `make test-matrix`)
# =============================================================================

[tool.hatch.envs.test]
[[tool.hatch.envs.test.matrix]]
python = ["3.12", "3.13", "3.14"]

# =============================================================================
# Ruff (lint + format)
# =============================================================================

[tool.ruff]
target-version = "py311"
line-length = 88
src = [
    "packages/companies-house/src",
    "packages/companies-house-abm/src",
    "packages/uk-data/src",
    "tests",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate
    "RUF",    # Ruff-specific rules
    "PLC",
]

[tool.ruff.lint.isort]
known-first-party = ["companies_house_abm", "companies_house", "uk_data"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ARG001"]
"packages/companies-house/src/companies_house/schema.py" = ["TCH003"]
"packages/companies-house/src/companies_house/api/models.py" = ["TCH003"]
"notebooks/**/*.py" = ["B018", "E501", "PLC0206", "PLC0415"]
# CLI commands use lazy imports intentionally (startup time + optional deps)
"**/cli.py" = ["PLC0415"]
# Optional-dependency adapters: kreuzberg (pdf), stream-read-xbrl (xbrl)
"packages/companies-house/src/companies_house/ingest/pdf.py" = ["PLC0415"]
"packages/companies-house/src/companies_house/ingest/xbrl.py" = ["PLC0415"]
# bank.py: Mortgage deferred to break circular import (runtime import inside method)
"packages/companies-house-abm/src/companies_house_abm/abm/agents/bank.py" = ["PLC0415"]

# =============================================================================
# ty (type checker)
# =============================================================================

[tool.ty.rules]
# Polars stubs don't fully align with ty's inference yet
invalid-assignment = "ignore"
# Polars LazyFrame chains: .collect() return type not inferred through Polars stubs
invalid-return-type = "warn"
# Dynamic dict unpacking (**kwargs) for YAML config and Polars stubs
invalid-argument-type = "warn"
unresolved-attribute = "warn"
not-subscriptable = "ignore"
# io.RawIOBase stub signatures don't match our TailBuffer.readinto signature
invalid-method-override = "warn"
# Optional Rust ABM extension is not built in the default dev environment
unresolved-import = "warn"
# ty false positive: confuses Simulation.step override with mesa.Model.step base class
missing-argument = "warn"

[tool.ty.src]
exclude = ["tests", "packages/uk-data/tests", "packages/uk-data/tests/adapters"]

# kreuzberg is an optional dep — not installed in dev by default
[[tool.ty.overrides]]
include = ["packages/companies-house/src/companies_house/ingest/pdf.py"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"

# =============================================================================
# Pytest
# =============================================================================

[tool.pytest.ini_options]
testpaths = ["tests", "packages/uk-data/tests"]
pythonpath = [
    "packages/companies-house/src",
    "packages/companies-house-abm/src",
    "packages/uk-data/src",
]
addopts = [
    "-ra",
    "-q",
    "--strict-markers",
    "--strict-config",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "network: marks tests that require external network access",
    "integration: marks integration tests that make real network requests (run with '-m integration')",
]

# =============================================================================
# Coverage
# =============================================================================

[tool.coverage.run]
source = ["companies_house", "companies_house_abm", "uk_data"]
branch = true
parallel = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
show_missing = true

# =============================================================================
# Changelog
# =============================================================================

[tool.git-cliff]
config = "cliff.toml"
