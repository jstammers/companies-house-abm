[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "companies_house_abm"
version = "0.4.1"
description = "Agent-Based Modelling using Companies House Account Data"
readme = "../../README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "jstammers", email = "jimmy.stammers@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "companies-house[xbrl,analysis]",
    "fastapi>=0.115.0",
    "marimo>=0.10.0",
    "matplotlib>=3.8.0",
    "mesa>=3.0.0",
    "networkx>=3.2",
    "numpy>=1.26.0",
    "polars>=1.38.1",
    "pydantic>=2.0.0",
    "pyyaml>=6.0.0",
    "pyzmq>=27.1.0",
    "scipy>=1.11.0",
    "typer>=0.12.0",
    "uvicorn[standard]>=0.30.0",
]

[project.scripts]
companies_house_abm = "companies_house_abm.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/companies_house_abm"]

[tool.uv.sources]
companies-house = { workspace = true }
